name: Generate Signing Key (run once, then delete)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Generate key pair
        run: cargo tauri signer generate -w /tmp/tauri.key --ci

      - name: Show public key
        run: |
          echo "===== PUBLIC KEY (paste into tauri.conf.json) ====="
          cat /tmp/tauri.key.pub

      - name: Upload private key as artifact (download then add as GitHub Secret, then delete this run)
        uses: actions/upload-artifact@v4
        with:
          name: tauri-signing-private-key
          path: /tmp/tauri.key
          retention-days: 1
